name: Build Windows release
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Build embedded Python with all packages
      - name: Build python/ folder
        shell: pwsh
        run: |
          $pyver = python -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}.{sys.version_info.micro}')"
          $url = "https://www.python.org/ftp/python/$pyver/python-$pyver-embed-amd64.zip"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile python-embed.zip
          Expand-Archive python-embed.zip -DestinationPath python
          Remove-Item python-embed.zip
          # Enable site-packages
          $pth = Get-ChildItem python -Filter "python*._pth"
          $content = Get-Content $pth.FullName
          $content = $content -replace '#import site', 'import site'
          $content += "`n..\`n"
          Set-Content $pth.FullName $content
          # Install pip + packages
          Invoke-WebRequest -Uri https://bootstrap.pypa.io/get-pip.py -OutFile get-pip.py
          python/python.exe get-pip.py --no-warn-script-location
          python/python.exe -m pip install setuptools --no-warn-script-location
          python/python.exe -m pip install -r requirements.txt --no-warn-script-location
          Remove-Item get-pip.py

      # ZIP the entire repo (with .git and python/)
      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path * -DestinationPath ../photobooth-win.zip
          Move-Item ../photobooth-win.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: photobooth-win
          path: photobooth-win.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: "Auto-built from main branch"
          prerelease: true
          files: photobooth-win.zip
