<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app">
        <!-- NO CAMERA -->
        <div class="screen" id="screen-no-camera" hidden>
            <div class="error-msg">КАМЕРА НЕ ПОДКЛЮЧЕНА</div>
            <div class="error-sub">Подключите камеру</div>
        </div>

        <!-- IDLE -->
        <div class="screen" id="screen-idle">
            <div class="tap-prompt">НАЖМИ ЧТОБЫ НАЧАТЬ</div>
        </div>

        <!-- SHOOTING: live view + countdown + flash -->
        <div class="screen" id="screen-shooting" hidden>
            <img id="live-view" alt="">
            <div id="countdown-number"></div>
            <div id="photo-counter"></div>
        </div>

        <!-- TEMPLATE SELECT -->
        <div class="screen" id="screen-template" hidden>
            <div class="template-title">ВЫБЕРИ ФОРМАТ</div>
            <div class="template-options">
                <button class="template-btn" data-template="strips">
                    <div class="template-preview strip-preview">
                        <div></div><div></div><div></div><div></div>
                    </div>
                    <span>2 полоски</span>
                </button>
                <button class="template-btn" data-template="grid">
                    <div class="template-preview grid-preview">
                        <div></div><div></div><div></div><div></div>
                    </div>
                    <span>4 фото</span>
                </button>
            </div>
            <div id="template-timer"></div>
        </div>

        <!-- DONE: printing status -->
        <div class="screen" id="screen-done" hidden>
            <div class="done-row">
                <img src="/assets/dots.svg" class="dots-anim">
                <div class="done-title">Идёт печать</div>
            </div>
        </div>

        <!-- QR modal (persists across screens) -->
        <div id="qr-modal" hidden>
            <div id="qr-modal-code"></div>
            <div id="qr-modal-text"></div>
        </div>

        <div id="flash-overlay"></div>
        <div id="debug-log" hidden></div>
        <button id="debug-toggle" hidden onclick="const l=document.getElementById('debug-log');l.hidden=!l.hidden"
            style="position:fixed;top:10px;left:10px;z-index:9999;padding:8px 16px;
            background:#333;color:#0f0;border:none;border-radius:4px;font-size:14px;cursor:pointer;opacity:0.7">
            LOGS</button>
        <button id="debug-restart" hidden onclick="this.disabled=true;this.textContent='RESTARTING...';fetch('/api/restart',{method:'POST'})"
            style="position:fixed;top:10px;right:10px;z-index:9999;padding:8px 16px;
            background:#c00;color:#fff;border:none;border-radius:4px;font-size:14px;cursor:pointer">
            RESTART</button>
    </div>

    <script src="/assets/qrcode.min.js"></script>
    <script src="/app.js"></script>
</body>
</html>
